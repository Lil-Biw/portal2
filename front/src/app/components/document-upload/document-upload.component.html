<div class="upload-section">
  <h3>Subir documentos</h3>
  <div class="scope-select">
    <label>
      <input type="radio" name="scope" [(ngModel)]="scopeChoice" value="general" /> Documentos generales
    </label>
    <label>
      <input type="radio" name="scope" [(ngModel)]="scopeChoice" value="empresa" /> Empresas
    </label>
    <label>
      <input type="radio" name="scope" [(ngModel)]="scopeChoice" value="centro" /> Centros de costos
    </label>
    <label>
      <input type="radio" name="scope" [(ngModel)]="scopeChoice" value="proyecto" /> Proyectos
    </label>
  </div>
  <div class="grid two">
    <label *ngIf="(scopeChoice === 'empresa' || tipo === 'empresa')">
      Empresa
      <select [(ngModel)]="selectedEmpresa" (ngModelChange)="empresaChange.emit($event)">
        <option value="">Selecciona empresa destino</option>
        <option *ngFor="let cliente of clientes" [value]="cliente._id">{{ cliente.razon_social || cliente.nombre }}</option>
      </select>
    </label>

    <label *ngIf="tipo === 'centro'">
      Empresa
      <select [(ngModel)]="selectedEmpresa" (ngModelChange)="empresaChange.emit($event)">
        <option value="">Selecciona empresa destino</option>
        <option *ngFor="let cliente of clientes" [value]="cliente._id">{{ cliente.razon_social || cliente.nombre }}</option>
      </select>
    </label>

    <label *ngIf="tipo === 'centro'">
      Centro de costos
      <select [(ngModel)]="selectedCentro" (ngModelChange)="centroChange.emit($event)">
        <option value="">Selecciona centro destino</option>
        <option *ngFor="let centro of centros" [value]="centro._id">{{ centro.nombre || centro.codigo }}</option>
      </select>
    </label>

    <label *ngIf="tipo === 'proyecto'">
      Empresa
      <select [(ngModel)]="selectedEmpresa" (ngModelChange)="empresaChange.emit($event)">
        <option value="">Selecciona empresa destino</option>
        <option *ngFor="let cliente of clientes" [value]="cliente._id">{{ cliente.razon_social || cliente.nombre }}</option>
      </select>
    </label>

    <label *ngIf="tipo === 'proyecto'">
      Centro de costos
      <select [(ngModel)]="selectedCentro" (ngModelChange)="centroChange.emit($event)">
        <option value="">Selecciona centro destino</option>
        <option *ngFor="let centro of centros" [value]="centro._id">{{ centro.nombre || centro.codigo }}</option>
      </select>
    </label>

    <label *ngIf="tipo === 'proyecto'">
      Proyecto
      <select [(ngModel)]="selectedProyecto" (ngModelChange)="proyectoChange.emit($event)">
        <option value="">Selecciona proyecto destino</option>
        <option *ngFor="let p of proyectos" [value]="p._id">{{ p.nombre || p.codigo }}</option>
      </select>
    </label>
  </div>

  <div class="upload-area">
    <input type="file" accept=".pdf" #fileInput (change)="onFileChange($event)" style="display:none" />
    <button class="ghost" (click)="fileInput.click()">Seleccionar PDF</button>
    <span *ngIf="uploadStatus as status" [class.error]="status.type === 'error'">{{ status.text }}</span>
  </div>

  <div class="documents-list" *ngIf="documentos && documentos.length">
    <h4>Documentos</h4>
    <div class="doc-item" *ngFor="let doc of documentos">
      <span>{{ doc.filename }}</span>
      <div>
        <button class="ghost" (click)="descargar.emit(doc.url)">Descargar</button>
        <button class="ghost" (click)="onEliminar(doc.filename)">Eliminar</button>
      </div>
    </div>
  </div>
</div>
